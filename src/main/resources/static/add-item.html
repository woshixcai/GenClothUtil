<!DOCTYPE html>
<html lang="zh-CN" data-theme="gentle-luxury">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StyleMe · 拍照入库</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .preview-img   { width:100%; border-radius:12px; object-fit:cover; max-height:300px; display:block; }
    .form-stack    { display:flex; flex-direction:column; gap:14px; }
    .field-row     { display:flex; gap:10px; }
    .field         { display:flex; flex-direction:column; gap:4px; flex:1; }
    .field-label   { font-size:13px; font-weight:500; color:var(--text-2,#555); }
    select.field-input   { appearance:none; }

    /* AI 穿搭 toggle 区 */
    .tryon-toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      background: var(--bg-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-m);
      cursor: pointer;
    }
    .tryon-toggle-label { display:flex; flex-direction:column; gap:3px; }
    .tryon-toggle-title { font-size:15px; font-weight:700; color:var(--text-1); }
    .tryon-toggle-sub   { font-size:12px; color:var(--text-3); }

    /* 参考图上传区 */
    .ref-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-m);
      min-height: 120px;
      display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px;
      cursor: pointer; transition: border-color .2s;
    }
    .ref-zone:hover { border-color: var(--c-primary); }
    .ref-zone-icon  { font-size: 32px; }
    .ref-zone-hint  { font-size: 13px; color: var(--text-3); }
    .ref-preview    { width:100%; max-height:200px; object-fit:cover; border-radius:10px; }

    /* 风格快选 */
    .style-quick    { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
    .style-pill     { padding:6px 14px; border-radius:100px; border:1.5px solid var(--border); font-size:13px; cursor:pointer; color:var(--text-2); transition: all .2s; }
    .style-pill.active { background:var(--grad); color:var(--btn-text); border-color:transparent; }

    /* 次数提示徽章 */
    .quota-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 12px; border-radius: 100px;
      background: var(--bg-2); border: 1px solid var(--border);
      font-size: 12px; color: var(--text-2);
    }
    .quota-badge.warn { background:#fff8e1; border-color:#ffe082; color:#b08000; }
    .quota-badge.out  { background:#fff5f5; border-color:#ffd0d0; color:#b04040; }

    /* 通知卡片（固定底部，底部导航上方） */
    .notify-card {
      position: fixed;
      bottom: calc(68px + env(safe-area-inset-bottom));
      left: 16px; right: 16px;
      z-index: 500;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-m);
      box-shadow: var(--shadow-l);
      padding: 14px 16px;
      display: flex; align-items: flex-start; gap: 12px;
      animation: slideUp .3s var(--ease);
      transition: opacity .3s;
    }
    .notify-card.hidden { display: none; }
    .notify-icon    { font-size: 28px; flex-shrink: 0; line-height: 1; }
    .notify-body    { flex: 1; min-width: 0; }
    .notify-title   { font-size: 14px; font-weight: 700; color: var(--text-1); margin-bottom: 3px; }
    .notify-sub     { font-size: 12px; color: var(--text-3); white-space: pre-wrap; }
    .notify-imgs    { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
    .notify-thumb   { width:58px; height:58px; object-fit:cover; border-radius:8px; border:1px solid var(--border); cursor:pointer; }
    .notify-close   { flex-shrink:0; width:24px; height:24px; border-radius:50%; background:var(--bg-2); color:var(--text-3); font-size:14px; display:flex;align-items:center;justify-content:center; cursor:pointer; margin-top:2px; }
    .notify-spin    { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--c-primary); border-radius:50%; animation:spin 0.8s linear infinite; flex-shrink:0; margin-top:5px; }
  </style>
</head>
<body>

<header class="header"><div class="header-inner">
  <div class="logo"><span class="logo-mark">✦</span><span class="logo-name">拍照入库</span></div>
  <div id="quotaDisplay"></div>
</div></header>

<main class="main" style="padding-top:72px">

  <!-- Step 01: 拍照 -->
  <section class="block">
    <div class="block-label">
      <span class="block-num">01</span><span class="block-title">拍照或上传</span>
    </div>
    <div class="ucard" style="cursor:pointer" id="photoCard">
      <div class="uzone" id="photoZone" style="min-height:180px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;">
        <input type="file" id="photoInput" accept="image/*" capture="environment" hidden>
        <div id="photoPh" style="text-align:center">
          <div style="font-size:40px">📷</div>
          <span style="font-size:14px;color:var(--text-3,#999)">点击拍照或选择图片</span>
        </div>
        <img class="preview-img hidden" id="previewImg" alt="预览">
      </div>
    </div>
    <p style="font-size:12px;color:var(--text-3);margin:8px 0 0;line-height:1.5">
      可先填写下方「商品信息」，再上传图片；<strong>入库前须上传主图</strong>。AI 识别为可选，点按钮即可填充名称与分类。
    </p>
    <button class="btn-gen" id="recognizeBtn" disabled style="margin-top:12px;width:100%">
      <span class="btn-gen-star">✦</span><span id="recognizeBtnText">AI 识别商品名称（可选）</span>
    </button>
  </section>

  <!-- Step 02: 商品信息（进入页面即可填写，不必先识别） -->
  <section class="block" id="itemFormSection">
    <div class="block-label">
      <span class="block-num">02</span><span class="block-title">填写商品信息</span>
    </div>
    <div class="form-stack">
      <div class="field">
        <label class="field-label">商品名称 *</label>
        <input class="field-input" type="text" id="itemName" placeholder="可手动填写，或用上方 AI 识别填充">
      </div>
      <div class="field">
        <label class="field-label">分类</label>
        <select class="field-input" id="itemCategory">
          <option value="">请选择</option>
          <option>上装</option><option>下装</option>
          <option>外套</option><option>裙装</option><option>配饰</option>
        </select>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">进价（元）</label>
          <input class="field-input" type="number" step="0.01" id="costPrice" placeholder="选填">
        </div>
        <div class="field">
          <label class="field-label">售价（元）</label>
          <input class="field-input" type="number" step="0.01" id="salePrice" placeholder="选填">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">颜色</label>
          <input class="field-input" type="text" id="skuColor" placeholder="随商品名称自动识别，可改">
        </div>
        <div class="field">
          <label class="field-label">尺码</label>
          <select class="field-input" id="skuSize">
            <option value="均码" selected>均码</option>
            <option>XS</option><option>S</option><option>M</option>
            <option>L</option><option>XL</option><option>XXL</option>
          </select>
        </div>
        <div class="field">
          <label class="field-label">库存数</label>
          <input class="field-input" type="number" id="stockQty" value="1" min="0">
        </div>
      </div>
    </div>
  </section>

  <!-- Step 03: 生成 AI 穿搭（可选） -->
  <section class="block" id="tryonSection">
    <div class="block-label">
      <span class="block-num">03</span><span class="block-title">生成 AI 穿搭效果（可选）</span>
    </div>

    <!-- Toggle -->
    <label class="tryon-toggle-row" for="tryonToggle">
      <div class="tryon-toggle-label">
        <span class="tryon-toggle-title">入库后同步生成穿搭效果图</span>
        <span class="tryon-toggle-sub" id="tryonToggleSub">开启后需上传一张模特参考图</span>
      </div>
      <label class="adm-switch" onclick="event.stopPropagation()">
        <input type="checkbox" id="tryonToggle">
        <span class="adm-switch-track"></span>
      </label>
    </label>

    <!-- 参考图上传（勾选后展开） -->
    <div class="hidden" id="tryonRefArea" style="margin-top:14px">
      <label class="field-label" style="margin-bottom:8px;display:block">
        模特参考图 <span style="color:var(--text-3);font-weight:400">（必填，可用真实模特/白底图/穿搭照）</span>
      </label>
      <div class="ref-zone" id="refZone">
        <input type="file" id="refInput" accept="image/*" hidden>
        <div id="refPh">
          <div class="ref-zone-icon">🧑</div>
          <div class="ref-zone-hint">点击上传模特参考图</div>
        </div>
        <img class="ref-preview hidden" id="refPreview" alt="参考图预览">
      </div>

      <!-- 风格快选 -->
      <label class="field-label" style="margin:12px 0 6px;display:block">穿搭风格</label>
      <div class="style-quick" id="styleQuick">
        <span class="style-pill active" data-val="休闲">休闲</span>
        <span class="style-pill" data-val="通勤">通勤</span>
        <span class="style-pill" data-val="甜美">甜美</span>
        <span class="style-pill" data-val="酷飒">酷飒</span>
        <span class="style-pill" data-val="复古">复古</span>
      </div>

      <label class="field-label" style="margin:12px 0 6px;display:block">使用场景</label>
      <div class="style-quick" id="sceneQuick">
        <span class="style-pill active" data-val="日常出行">日常出行</span>
        <span class="style-pill" data-val="职场办公">职场办公</span>
        <span class="style-pill" data-val="约会">约会</span>
        <span class="style-pill" data-val="聚会">聚会</span>
      </div>
    </div>
  </section>

  <!-- 保存按钮 -->
  <section class="block" id="saveBtnSection">
    <button class="btn-gen" id="saveBtn" style="width:100%">
      <span class="btn-gen-star">✦</span><span id="saveBtnText">确认入库</span>
    </button>
  </section>

  <!-- Toast -->
  <div class="toast hidden" id="toast"><span class="toast-icon">⚠</span><span id="toastMsg"></span></div>
</main>

<!-- 通知卡片（固定底部） -->
<div class="notify-card hidden" id="notifyCard">
  <div id="notifyIconOrSpin">
    <div class="notify-spin hidden" id="notifySpin"></div>
    <div class="notify-icon hidden" id="notifyIcon"></div>
  </div>
  <div class="notify-body">
    <div class="notify-title" id="notifyTitle"></div>
    <div class="notify-sub"   id="notifySub"></div>
    <div class="notify-imgs"  id="notifyImgs"></div>
  </div>
  <div class="notify-close" id="notifyClose">×</div>
</div>

<!-- 底部导航（按功能分区收纳） -->
<nav class="bottom-nav">
  <a class="bnav-item" href="index.html"><span class="bnav-icon">🏠</span><span class="bnav-label">换装</span></a>
  <a class="bnav-item active" href="ops.html"><span class="bnav-icon">🧾</span><span class="bnav-label">进销存</span></a>
  <a class="bnav-item" href="admin.html" id="adminNavItem" style="display:none">
    <span class="bnav-icon">⚙️</span><span class="bnav-label">系统管理</span>
  </a>
</nav>

<script>
/* ================================================================
   add-item.js 内嵌脚本
   ================================================================ */
const getToken = () => localStorage.getItem('sm_token') || '';
const getPerms = () => JSON.parse(localStorage.getItem('sm_perms') || '[]');

let toastTimer;
const showToast = (msg, dur = 3500, type = 'error') => {
  const t    = document.getElementById('toast');
  const icon = t.querySelector('.toast-icon');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.toggle('toast-ok', type === 'ok');
  if (icon) icon.textContent = type === 'ok' ? '✓' : '⚠';
  t.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.add('hidden'), dur);
};

/* ── 管理导航显隐 ─────────────────────────────── */
(function() {
  const p = getPerms();
  const show = p.includes('sys:manage') || p.includes('user:shop_manage');
  const nav  = document.getElementById('adminNavItem');
  if (nav) nav.style.display = show ? '' : 'none';
})();

/* ── 从商品名称解析颜色（与后端 InventoryService 关键词一致） ── */
const COLOR_KWS = [
  '混色', '花色', '条纹', '格子',
  '黑色', '白色', '米白', '米色',
  '棕色', '咖色', '驼色', '褐色',
  '灰色', '银灰',
  '红色', '酒红', '玫红', '粉色', '紫色',
  '蓝色', '深蓝', '浅蓝', '藏蓝',
  '绿色', '墨绿', '橄榄绿',
  '黄色', '姜黄', '橙色'
];
function extractColorFromText(text) {
  if (!text) return '';
  const s = String(text).trim();
  if (!s) return '';
  for (const kw of COLOR_KWS) {
    if (s.includes(kw)) return kw;
  }
  return '';
}
function syncColorFromItemName() {
  const name = document.getElementById('itemName').value;
  const c = extractColorFromText(name);
  if (c) document.getElementById('skuColor').value = c;
}

/* ── 文件变量 ─────────────────────────────────── */
let photoFile = null;
let refFile   = null;

document.getElementById('itemName').addEventListener('input', () => syncColorFromItemName());
document.getElementById('itemName').addEventListener('blur', () => syncColorFromItemName());

/* ── Step 01：拍照 ────────────────────────────── */
document.getElementById('photoCard').addEventListener('click', () =>
  document.getElementById('photoInput').click());

document.getElementById('photoInput').addEventListener('change', e => {
  photoFile = e.target.files[0];
  if (!photoFile) return;

  // 仅预览，不做任何处理
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('previewImg');
    img.src = ev.target.result;
    img.classList.remove('hidden');
    document.getElementById('photoPh').style.display = 'none';
  };
  reader.readAsDataURL(photoFile);

  document.getElementById('recognizeBtn').disabled = false;

  // 第 2 步起默认已展示；选好图后启用识别并滚动提示可点识别
  loadQuota();
  document.getElementById('recognizeBtn').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
});

/* ── AI 识别 ──────────────────────────────────── */
document.getElementById('recognizeBtn').addEventListener('click', async () => {
  if (!photoFile) return;
  if (!getToken()) { showToast('请先登录后使用'); return; }

  const btnEl  = document.getElementById('recognizeBtn');
  const btnTxt = document.getElementById('recognizeBtnText');
  btnTxt.textContent = '压缩中…';
  btnEl.disabled     = true;

  try {
    // 识别只需 512px，大幅减少 base64 体积，加快推理速度
    const compressed = await compressImage(photoFile, 512, 0.80);

    btnTxt.textContent = '识别中…';
    const fd = new FormData();
    fd.append('image', compressed);
    const res  = await fetch('/inventory/recognize', {
      method: 'POST', headers: { 'Authorization': 'Bearer ' + getToken() }, body: fd
    });
    const data = await res.json();
    if (data.code === 200 && data.data) {
      document.getElementById('itemName').value = data.data.name || '';
      syncColorFromItemName();
      const cat = data.data.category || '';
      if (cat) {
        const sel = document.getElementById('itemCategory');
        const opt = Array.from(sel.options).find(o => o.value === cat);
        if (opt) sel.value = cat;
      }
    } else {
      showToast('AI识别失败，请手动填写');
    }
  } catch(e) {
    showToast('网络错误，请手动填写');
  }

  btnTxt.textContent = 'AI 识别商品名称';
  btnEl.disabled     = false;

  // 识别成功后已自动填充字段；后续区域在“选择图片”时已展示，无需再重复展开
});

/* ── 剩余次数显示 ─────────────────────────────── */
async function loadQuota() {
  const token = getToken();
  if (!token) return;
  try {
    const res  = await fetch('/auth/quota', { headers: { 'Authorization': 'Bearer ' + token } });
    const data = await res.json();
    if (data.code === 200) {
      const { remaining, unlimited } = data.data;
      const badge = document.getElementById('quotaDisplay');
      const sub   = document.getElementById('tryonToggleSub');
      if (unlimited) {
        badge.innerHTML = '<span class="quota-badge">✦ AI穿搭 不限次数</span>';
        sub.textContent = '开启后需上传一张模特参考图';
      } else if (remaining === 0) {
        badge.innerHTML = '<span class="quota-badge out">今日次数已用完</span>';
        document.getElementById('tryonToggle').disabled = true;
        sub.textContent = '今日免费次数（5次/天）已用完，明日恢复';
      } else {
        badge.innerHTML = `<span class="quota-badge${remaining <= 2 ? ' warn' : ''}">今日剩余 ${remaining} 次</span>`;
        sub.textContent = `开启后需上传一张模特参考图（今日还剩 ${remaining} 次）`;
      }
    }
  } catch(e) { /* 静默失败 */ }
}

/* ── AI 穿搭 Toggle ───────────────────────────── */
document.getElementById('tryonToggle').addEventListener('change', function() {
  const area = document.getElementById('tryonRefArea');
  if (this.checked) {
    area.classList.remove('hidden');
    area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } else {
    area.classList.add('hidden');
    refFile = null;
    document.getElementById('refPreview').classList.add('hidden');
    document.getElementById('refPh').style.display = '';
  }
});

/* ── 参考图上传 ───────────────────────────────── */
document.getElementById('refZone').addEventListener('click', () =>
  document.getElementById('refInput').click());

document.getElementById('refInput').addEventListener('change', e => {
  refFile = e.target.files[0];
  if (!refFile) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('refPreview');
    img.src = ev.target.result;
    img.classList.remove('hidden');
    document.getElementById('refPh').style.display = 'none';
  };
  reader.readAsDataURL(refFile);
});

/* ── 风格 / 场景快选 ──────────────────────────── */
function initPillGroup(groupId) {
  document.getElementById(groupId).querySelectorAll('.style-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.getElementById(groupId).querySelectorAll('.style-pill')
        .forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
    });
  });
}
initPillGroup('styleQuick');
initPillGroup('sceneQuick');

function getActivePill(groupId) {
  const el = document.querySelector(`#${groupId} .style-pill.active`);
  return el ? el.dataset.val : '';
}

/* ── 保存入库 ─────────────────────────────────── */
document.getElementById('saveBtn').addEventListener('click', async () => {
  const itemName = document.getElementById('itemName').value.trim();
  const tryonOn  = document.getElementById('tryonToggle').checked;

  if (!itemName)  { showToast('请填写商品名称'); return; }
  if (!photoFile) { showToast('请先拍照或上传图片'); return; }
  if (tryonOn && !refFile) { showToast('请上传模特参考图后再入库'); return; }

  const btnEl  = document.getElementById('saveBtn');
  const btnTxt = document.getElementById('saveBtnText');
  btnTxt.textContent = '入库中…';
  btnEl.disabled     = true;

  let saved = false;

  try {
    btnTxt.textContent = '压缩图片…';
    const compressed = await compressImage(photoFile);

    btnTxt.textContent = '入库中…';
    const fd = new FormData();
    fd.append('image', compressed);
    fd.append('itemName', itemName);
    const cat  = document.getElementById('itemCategory').value;
    const cost = document.getElementById('costPrice').value;
    const sale = document.getElementById('salePrice').value;
    const color= document.getElementById('skuColor').value;
    const size = document.getElementById('skuSize').value;
    const qty  = document.getElementById('stockQty').value;
    if (cat)  fd.append('category', cat);
    if (cost) fd.append('costPrice', cost);
    if (sale) fd.append('salePrice', sale);
    if (color)fd.append('color', color);
    if (size) fd.append('size', size);
    if (qty)  fd.append('stockQty', qty);

    const res  = await fetch('/inventory/items', {
      method: 'POST', headers: { 'Authorization': 'Bearer ' + getToken() }, body: fd
    });

    // 统一解析，兼容 ApiResult 格式和 Spring Boot 原生 500 格式
    let data;
    try { data = await res.json(); } catch(_) { data = {}; }

    const ok  = data.code === 200 || res.ok && data.code == null;
    const msg = data.msg || data.message || (res.ok ? null : `HTTP ${res.status}`);

    if (!ok) {
      showToast('入库失败：' + (msg || '请重试'), 5000);
      return;
    }

    saved = true;

    if (!tryonOn) {
      showToast('入库成功！', 1500, 'ok');
      setTimeout(() => location.href = 'inventory.html', 1200);
      return;
    }

    // 入库成功 + 需要生成 AI 穿搭 → 展示通知，异步生成
    showToast('入库成功！AI 穿搭生成中，请稍候…', 2500, 'ok');
    showNotify('generating');
    triggerTryon(photoFile, refFile,
      getActivePill('styleQuick'), getActivePill('sceneQuick'));

  } catch(e) {
    showToast('网络错误：' + (e.message || '请检查网络后重试'), 5000);
  } finally {
    // 无论任何分支（成功/失败/异常）都恢复按钮，
    // 仅在成功且无需 tryon 时（会跳转）可保持灰色
    if (!saved || tryonOn) {
      btnTxt.textContent = '确认入库';
      btnEl.disabled     = false;
    }
  }
});

/* ── 压缩图片（同 main.js 一致） ─────────────── */
function compressImage(file, maxLongEdge = 1200, quality = 0.85) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        if (Math.max(img.width, img.height) <= maxLongEdge) { resolve(file); return; }
        const scale = maxLongEdge / Math.max(img.width, img.height);
        const canvas = document.createElement('canvas');
        canvas.width  = Math.round(img.width  * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(blob => {
          resolve(new File([blob], (file.name || 'image').replace(/\.[^.]+$/, '.jpg'), { type: 'image/jpeg' }));
        }, 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ── 异步触发穿搭（submit + 轮询） ───────────── */
async function triggerTryon(clothFile, modelFile, style, scene) {
  try {
    // 压缩
    const cloth = await compressImage(clothFile);
    const ref   = await compressImage(modelFile);

    // 提交任务
    const fd = new FormData();
    fd.append('clothesFiles',   cloth, cloth.name);
    fd.append('referenceFiles', ref,   ref.name);
    fd.append('style',  style  || '休闲');
    fd.append('scene',  scene  || '日常出行');
    fd.append('season', '春季');

    const submitRes  = await fetch('/tryon/submit', {
      method: 'POST', headers: { 'Authorization': 'Bearer ' + getToken() }, body: fd
    });
    const submitData = await submitRes.json();
    if (submitData.code !== 200) { showNotify('error', null, null, null, submitData.msg || '提交失败'); return; }

    const taskId = submitData.data?.taskId;

    // 轮询（最多 60s）
    for (let i = 0; i < 30; i++) {
      await new Promise(r => setTimeout(r, 2000));
      const res  = await fetch(`/tryon/result/${taskId}`, { headers: { 'Authorization': 'Bearer ' + getToken() } });
      const data = await res.json();
      if (data.code !== 200) continue;
      const d = data.data || {};
      if (d.status === 'done') {
        showNotify('done', d.recommendImgs || [], style, scene);
        loadQuota();
        return;
      }
      if (d.status === 'failed') { showNotify('error', null, null, null, d.message || '生成失败'); return; }
    }
    showNotify('error', null, null, null, '生成超时，请重试');
  } catch(e) {
    showNotify('error', null, null, null, '网络错误：' + e.message);
  }
  loadQuota();
}

/* ── 通知卡片 ─────────────────────────────────── */
function showNotify(state, imgs, style, scene, errMsg) {
  const card  = document.getElementById('notifyCard');
  const spin  = document.getElementById('notifySpin');
  const icon  = document.getElementById('notifyIcon');
  const title = document.getElementById('notifyTitle');
  const sub   = document.getElementById('notifySub');
  const imgEl = document.getElementById('notifyImgs');

  card.classList.remove('hidden');
  imgEl.innerHTML = '';

  if (state === 'generating') {
    spin.classList.remove('hidden');
    icon.classList.add('hidden');
    title.textContent = 'AI 穿搭生成中…';
    sub.textContent   = '通常需要 10~30 秒，完成后将在此显示效果图';
  } else if (state === 'done') {
    spin.classList.add('hidden');
    icon.classList.remove('hidden');
    icon.textContent  = '✅';
    title.textContent = `${style || ''}穿搭效果已生成！`;
    sub.textContent   = `场景：${scene || '日常出行'}  点击缩略图查看大图`;
    (imgs || []).forEach(url => {
      const img = document.createElement('img');
      img.className = 'notify-thumb';
      img.src = url;
      img.alt = 'AI穿搭效果图';
      img.addEventListener('click', () => window.open(url, '_blank'));
      imgEl.appendChild(img);
    });
  } else {
    spin.classList.add('hidden');
    icon.classList.remove('hidden');
    icon.textContent  = '⚠️';
    title.textContent = '穿搭生成失败';
    sub.textContent   = errMsg || '请稍后重试';
  }
}

document.getElementById('notifyClose').addEventListener('click', () => {
  document.getElementById('notifyCard').classList.add('hidden');
});

/* 进入页面即可填第 2 步：提前拉取配额展示 */
if (getToken()) loadQuota();
