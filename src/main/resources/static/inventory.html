<!DOCTYPE html>
<html lang="zh-CN" data-theme="gentle-luxury">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StyleMe · 服装库</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .cat-tabs { display:flex; gap:8px; overflow-x:auto; padding:0 16px 8px; scrollbar-width:none; }
    .cat-tabs::-webkit-scrollbar { display:none; }
    .cat-tab { padding:6px 16px; border-radius:20px; border:1px solid var(--border,#eee); font-size:13px; cursor:pointer; white-space:nowrap; background:var(--bg-page,#fdfaf7); color:var(--text-2,#555); }
    .cat-tab.active { background:var(--accent,#c0876a); color:#fff; border-color:var(--accent,#c0876a); }
    .item-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; padding:0 16px 16px; }
    .item-card { background:var(--bg-card,#fff); border-radius:14px; overflow:hidden; border:1px solid var(--border,#eee); cursor:pointer; }
    .item-img { width:100%; aspect-ratio:3/4; background:#f5f5f5; display:flex;align-items:center;justify-content:center;font-size:40px; overflow:hidden; position:relative; }
    .item-img img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    .item-info { padding:10px 12px; }
    .item-name { font-size:13px; font-weight:600; color:var(--text-1,#222); margin-bottom:4px; white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .item-price { font-size:12px; color:var(--text-3,#999); }
    .item-sale { color:var(--accent,#c0876a); font-weight:600; }
    .item-cost { margin-left:6px; }
    .empty-tip { text-align:center; padding:60px 0; color:var(--text-3,#999); font-size:14px; }
    .loading-tip { text-align:center; padding:40px 0; color:var(--text-3,#999); font-size:14px; }
    .item-card   { position: relative; }
    .item-del-btn {
      position: absolute; top: 6px; right: 6px;
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(0,0,0,.35); color: #fff;
      font-size: 13px; line-height: 22px; text-align: center;
      cursor: pointer; z-index: 2; user-select: none;
    }
    .item-del-btn:active { background: rgba(180,40,40,.8); }
  </style>
</head>
<body>
<header class="header"><div class="header-inner">
  <div class="logo"><span class="logo-mark">✦</span><span class="logo-name">服装库</span></div>
  <div class="header-right">
    <div class="auth-wrap">
      <div class="user-chip" id="userChip" style="display:none">
        <span class="user-name" id="userName"></span>
      </div>
    </div>
  </div>
</div></header>

<main class="main" style="padding-top:72px">
  <!-- 分类 Tab -->
  <div class="cat-tabs" id="catTabs">
    <button class="cat-tab active" data-cat="">全部</button>
    <button class="cat-tab" data-cat="上装">上装</button>
    <button class="cat-tab" data-cat="下装">下装</button>
    <button class="cat-tab" data-cat="外套">外套</button>
    <button class="cat-tab" data-cat="裙装">裙装</button>
    <button class="cat-tab" data-cat="配饰">配饰</button>
  </div>

  <div id="loadingTip" class="loading-tip">加载中…</div>
  <div class="item-grid" id="itemGrid" style="display:none"></div>
  <div class="empty-tip hidden" id="emptyTip">暂无商品，去拍照入库吧 📷</div>

  <div class="toast hidden" id="toast"><span class="toast-icon">⚠</span><span id="toastMsg"></span></div>
</main>

<nav class="bottom-nav">
  <a class="bnav-item" href="index.html"><span class="bnav-icon">🏠</span><span class="bnav-label">换装</span></a>
  <a class="bnav-item active" href="inventory.html"><span class="bnav-icon">📦</span><span class="bnav-label">服装库</span></a>
  <a class="bnav-item bnav-add" href="add-item.html"><span class="bnav-icon">＋</span><span class="bnav-label">入库</span></a>
  <a class="bnav-item" href="order.html"><span class="bnav-icon">🧾</span><span class="bnav-label">开单</span></a>
  <a class="bnav-item" href="order-list.html"><span class="bnav-icon">📊</span><span class="bnav-label">订单</span></a>
</nav>

<script>
const getToken = () => localStorage.getItem('sm_token') || '';
const getPerms = () => JSON.parse(localStorage.getItem('sm_perms') || '[]');

// 管理导航显隐
(function() {
  const p = getPerms();
  const nav = document.getElementById('adminNavItem');
  if (nav && (p.includes('sys:manage') || p.includes('user:shop_manage'))) nav.style.display = '';
})();
const showToast = (msg, type = 'error') => {
  const t    = document.getElementById('toast');
  const icon = t.querySelector('.toast-icon');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.toggle('toast-ok', type === 'ok');
  if (icon) icon.textContent = type === 'ok' ? '✓' : '⚠';
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 3000);
};

let currentCat = '';

async function loadItems(cat) {
  document.getElementById('loadingTip').style.display = 'block';
  document.getElementById('itemGrid').style.display = 'none';
  document.getElementById('emptyTip').classList.add('hidden');

  try {
    const url = '/inventory/items' + (cat ? '?category=' + encodeURIComponent(cat) : '');
    const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + getToken() } });
    if (res.status === 401) { location.href = 'index.html'; return; }
    const data = await res.json();
    if (data.code !== 200) { showToast('加载失败'); return; }
    renderItems(data.data || []);
  } catch(e) {
    showToast('网络错误');
  } finally {
    document.getElementById('loadingTip').style.display = 'none';
  }
}

function renderItems(items) {
  const grid = document.getElementById('itemGrid');
  if (items.length === 0) {
    grid.style.display = 'none';
    document.getElementById('emptyTip').classList.remove('hidden');
    return;
  }
  grid.innerHTML = items.map(item => `
    <div class="item-card">
      <div class="item-del-btn" onclick="confirmDelete(${item.id}, '${(item.itemName||'').replace(/'/g,'')}')" title="删除">×</div>
      <div class="item-img" onclick="useForTryon('${item.id}')">
        ${item.mainImageUrl
          ? `<img src="${item.mainImageUrl}" alt="${item.itemName}" loading="lazy">`
          : '👗'}
      </div>
      <div class="item-info" onclick="useForTryon('${item.id}')">
        <div class="item-name">${item.itemName || '未命名商品'}</div>
        <div class="item-price">
          ${item.salePrice != null ? `<span class="item-sale">¥${item.salePrice}</span>` : ''}
          ${item.costPrice != null ? `<span class="item-cost">进价 ¥${item.costPrice}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');
  grid.style.display = 'grid';
}

function useForTryon(itemId) {
  location.href = 'index.html?fromInventory=' + itemId;
}

async function confirmDelete(itemId, name) {
  if (!confirm(`确定删除「${name || '该商品'}」？删除后不可恢复。`)) return;
  try {
    const res  = await fetch(`/inventory/items/${itemId}`, {
      method: 'DELETE', headers: { 'Authorization': 'Bearer ' + getToken() }
    });
    const data = await res.json();
    if (data.code === 200) {
      showToast('已删除', 'ok');
      loadItems(currentCat);
    } else {
      showToast(data.msg || '删除失败');
    }
  } catch(e) {
    showToast('网络错误');
  }
}

document.getElementById('catTabs').addEventListener('click', e => {
  const tab = e.target.closest('.cat-tab');
  if (!tab) return;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentCat = tab.dataset.cat;
  loadItems(currentCat);
});

(async function init() {
  const token = getToken();
  if (!token) { location.href = 'index.html'; return; }
  const stored = localStorage.getItem('sm_userInfo');
  if (stored) {
    try {
      const info = JSON.parse(stored);
      if (info.username) {
        document.getElementById('userName').textContent = info.username;
        document.getElementById('userChip').style.display = 'flex';
      }
    } catch(e) {}
  }
  await loadItems('');
})();
</script>
</body>
</html>
