<!DOCTYPE html>
<html lang="zh-CN" data-theme="gentle-luxury">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StyleMe · 小票入库</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .receipt-wrap { padding-top:72px; padding-bottom:110px; }
    .uploader-card {
      background: var(--bg-card,#fff);
      border: 1.5px solid var(--border,#eee);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow-s);
    }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    .row > * { flex: 0 0 auto; }
    .preview {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 12px;
      background: #f5f5f5;
      border: 1px solid var(--border,#eee);
      display:none;
    }
    .btn-group { display:flex; gap:12px; margin-top:12px; }
    .btn-group .btn-outline, .btn-group .btn-solid { flex: 1; }
    .result-card {
      margin-top: 14px;
      background: var(--bg-card,#fff);
      border: 1.5px solid var(--border,#eee);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow-s);
    }
    .result-title { font-size: 14px; font-weight: 800; color: var(--text-1,#222); margin-bottom: 8px; }
    .table {
      width:100%;
      border-collapse: collapse;
      font-size: 13px;
      color: var(--text-2,#555);
    }
    .table th, .table td {
      border-bottom: 1px solid var(--border,#eee);
      padding: 10px 6px;
      text-align:left;
      vertical-align: top;
      word-break: break-word;
    }
    .table th { font-size: 12px; color: var(--text-3,#999); }
    .muted { color: var(--text-3,#999); font-size: 12px; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-mark">✦</span>
      <span class="logo-name">小票入库</span>
    </div>
    <div class="header-right">
      <div class="auth-wrap">
        <button class="btn-login" onclick="location.href='index.html'" id="loginBtn" style="display:none">登录后使用</button>
      </div>
    </div>
  </div>
</header>

<main class="main receipt-wrap">
  <div class="uploader-card">
    <div class="row">
      <div>
        <input type="file" id="receiptInput" accept="image/*" capture="environment" style="display:none">
        <button class="btn-gen" style="min-width: 200px; padding: 14px 22px;" onclick="document.getElementById('receiptInput').click()">
          <span class="btn-gen-star">✦</span>上传小票图片
        </button>
      </div>
      <div class="muted" id="receiptHint">支持：拍照/截图。建议清晰可见“每件进价 × 数量”。</div>
    </div>

    <img class="preview" id="receiptPreview" alt="小票预览">

    <div class="btn-group">
      <button class="btn-outline" id="recognizeBtn" disabled>识别</button>
      <button class="btn-solid"   id="importBtn" disabled>识别并入库</button>
    </div>
  </div>

  <div class="result-card hidden" id="resultCard">
    <div class="result-title" id="resultTitle">识别结果</div>
    <div class="muted" id="orderNoText" style="margin-bottom:8px"></div>
    <table class="table" id="resultTable">
      <thead>
        <tr>
          <th>行号</th>
          <th>品名</th>
          <th>分类</th>
          <th>颜色</th>
          <th>尺码</th>
          <th>数量</th>
          <th>进价(单价)</th>
        </tr>
      </thead>
      <tbody id="resultBody"></tbody>
    </table>
  </div>

  <div class="toast hidden" id="toast">
    <span class="toast-icon">⚠</span>
    <span id="toastMsg"></span>
  </div>
</main>

<nav class="bottom-nav">
  <a class="bnav-item" href="index.html">
    <span class="bnav-icon">🏠</span><span class="bnav-label">换装</span>
  </a>
  <a class="bnav-item active" href="ops.html">
    <span class="bnav-icon">🧾</span><span class="bnav-label">进销存</span>
  </a>
  <a class="bnav-item" href="admin.html" id="adminNavItem" style="display:none">
    <span class="bnav-icon">⚙️</span><span class="bnav-label">系统管理</span>
  </a>
</nav>

<script>
  const getToken = () => localStorage.getItem('sm_token') || '';
  const getPerms = () => JSON.parse(localStorage.getItem('sm_perms') || '[]');

  (function initNav() {
    const token = getToken();
    if (!token) {
      const btn = document.getElementById('loginBtn');
      if (btn) btn.style.display = '';
      // 不强制跳转，给你展示页面也行
      return;
    }
    const perms = getPerms();
    const showAdmin = perms.includes('sys:manage') || perms.includes('user:shop_manage');
    const nav = document.getElementById('adminNavItem');
    if (nav) nav.style.display = showAdmin ? '' : 'none';
  })();

  let receiptFile = null;
  let lastParsed = null;

  let toastTimer;
  function showToast(msg, type = 'error') {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.toggle('toast-ok', type === 'ok');
    t.classList.remove('hidden');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.add('hidden'), 3500);
  }

  // 压缩：尽量保留数字清晰度，同时减小体积加快识别
  function compressImage(file, maxLongEdge = 1024, quality = 0.85) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const longEdge = Math.max(img.width, img.height);
          if (longEdge <= maxLongEdge) { resolve(file); return; }
          const scale = maxLongEdge / longEdge;
          const canvas = document.createElement('canvas');
          canvas.width  = Math.round(img.width  * scale);
          canvas.height = Math.round(img.height * scale);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          canvas.toBlob(blob => {
            const name = (file.name || 'image').replace(/\.[^.]+$/, '.jpg');
            resolve(new File([blob], name, { type: 'image/jpeg' }));
          }, 'image/jpeg', quality);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  document.getElementById('receiptInput').addEventListener('change', e => {
    receiptFile = e.target.files[0] || null;
    const preview = document.getElementById('receiptPreview');
    const recognizeBtn = document.getElementById('recognizeBtn');
    const importBtn = document.getElementById('importBtn');
    if (!receiptFile) {
      preview.style.display = 'none';
      recognizeBtn.disabled = true;
      importBtn.disabled = true;
      return;
    }
    const reader = new FileReader();
    reader.onload = ev => {
      preview.src = ev.target.result;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(receiptFile);
    recognizeBtn.disabled = false;
    importBtn.disabled = false;
    document.getElementById('resultCard').classList.add('hidden');
    lastParsed = null;
  });

  async function postReceipt(endpoint) {
    if (!receiptFile) { showToast('请先上传小票'); return null; }
    const token = getToken();
    if (!token) { location.href = 'index.html'; return null; }

    const compressed = await compressImage(receiptFile, 1024, 0.85);
    const fd = new FormData();
    fd.append('image', compressed);

    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
      body: fd
    });
    const data = await res.json().catch(() => ({}));
    if (data.code !== 200) {
      throw new Error(data.msg || '请求失败：' + res.status);
    }
    return data.data;
  }

  document.getElementById('recognizeBtn').addEventListener('click', async () => {
    try {
      const recognizeBtn = document.getElementById('recognizeBtn');
      recognizeBtn.disabled = true;
      recognizeBtn.textContent = '识别中…';

      const parsed = await postReceipt('/inventory/receipt/recognize');
      lastParsed = parsed;
      renderParsed(parsed);
      showToast('识别完成', 'ok');
    } catch (e) {
      showToast(e.message || '识别失败');
    } finally {
      const recognizeBtn = document.getElementById('recognizeBtn');
      recognizeBtn.disabled = false;
      recognizeBtn.textContent = '识别';
    }
  });

  document.getElementById('importBtn').addEventListener('click', async () => {
    try {
      const importBtn = document.getElementById('importBtn');
      importBtn.disabled = true;
      importBtn.textContent = '入库中…';

      const data = await postReceipt('/inventory/receipt/import');
      const cnt = data && data.createdCount != null ? data.createdCount : 0;
      showToast('入库成功，新增商品数：' + cnt, 'ok');
      setTimeout(() => location.href = 'inventory.html', 900);
    } catch (e) {
      showToast(e.message || '入库失败');
    } finally {
      const importBtn = document.getElementById('importBtn');
      importBtn.disabled = false;
      importBtn.textContent = '识别并入库';
    }
  });

  function renderParsed(parsed) {
    const card = document.getElementById('resultCard');
    const body = document.getElementById('resultBody');
    body.innerHTML = '';

    const orderNo = parsed && parsed.orderNo ? parsed.orderNo : '';
    document.getElementById('orderNoText').textContent = orderNo ? ('小票号：' + orderNo) : '';

    const items = parsed && parsed.items ? parsed.items : [];
    if (!items.length) {
      body.innerHTML = '<tr><td colspan="7" class="muted">未识别到明细</td></tr>';
    } else {
      body.innerHTML = items.map(it => {
        const lineNo = it.lineNo == null ? '' : it.lineNo;
        const itemName = it.itemName || '';
        const category = it.category || '';
        const color = it.color || '';
        const size = it.size || '';
        const qty = it.qty == null ? 0 : it.qty;
        const unitCost = it.unitCostPrice == null ? '' : it.unitCostPrice;
        return `<tr>
          <td>${lineNo}</td>
          <td>${itemName}</td>
          <td>${category}</td>
          <td>${color}</td>
          <td>${size}</td>
          <td>${qty}</td>
          <td>${unitCost}</td>
        </tr>`;
      }).join('');
    }
    card.classList.remove('hidden');
  }
</script>
</body>
</html>
